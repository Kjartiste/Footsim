<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8"><title>Aperçu visuels Footsim</title>
<style>
  body{margin:0;background:#0a0a0a;font-family:system-ui,sans-serif;color:#ddd;display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px}
  h1{font-size:15px;margin:6px 0;color:#8fd}
  #canvas-wrap{width:min(92vw,760px);height:min(62vw,520px);background:#000;border-radius:10px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.6)}
  canvas{display:block}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  button{background:#1c3;border:none;color:#022;font-weight:700;padding:8px 14px;border-radius:7px;cursor:pointer;font-size:13px}
  button:hover{filter:brightness(1.1)}
  .hint{font-size:11px;color:#888;max-width:640px;text-align:center;line-height:1.5}
</style></head>
<body>
<h1>Aperçu — terrain, joueurs, ballon, temps forts</h1>
<div class="hint">Ceci est un aperçu isolé du nouveau rendu (hors moteur de jeu). Le vrai jeu ajoute les sorts, les stats, etc. Clique « BUT ! » pour voir la secousse + le flash.</div>
<div id="canvas-wrap"><canvas id="cvs"></canvas></div>
<div class="row">
  <button onclick="doGoal('#e0402f')">⚽ BUT ! (rouge)</button>
  <button onclick="doGoal('#2f7fe0')">⚽ BUT ! (bleu)</button>
  <button onclick="toggleSprint()">🏃 Sprint on/off</button>
  <button onclick="castSpell()">✨ Sort (particules lumineuses)</button>
</div>
<script>
// ─── Constantes terrain (7v7) ───
let WW=75,WH=50, PCX=WW/2,PCY=WH/2, GY1=PCY-3,GY2=PCY+3, PSX=9, PA_W=12,PA_H=26;
const LINE='rgba(255,255,255,.46)';
const cvs=document.getElementById('cvs'), ctx=cvs.getContext('2d');
let _s=1,_ox=0,_oy=0;
const wx=x=>x*_s+_ox, wy=y=>y*_s+_oy, ws=v=>v*_s;
let _pitchCache=null,_pitchW=0,_pitchH=0;
function resize(){const wrap=document.getElementById('canvas-wrap');cvs.width=wrap.offsetWidth;cvs.height=wrap.offsetHeight;
  const m=8,sx=(cvs.width-m*2)/WW,sy=(cvs.height-m*2)/WH;_s=Math.min(sx,sy);_ox=(cvs.width-WW*_s)/2;_oy=(cvs.height-WH*_s)/2;_pitchCache=null;}
function lighten(hex,amt){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,r+255*amt)},${Math.min(255,g+255*amt)},${Math.min(255,b+255*amt)})`;}

function _buildPitchCache(){
  const oc=document.createElement('canvas');oc.width=cvs.width;oc.height=cvs.height;const c=oc.getContext('2d');
  c.fillStyle='#0f2a0f';c.fillRect(0,0,oc.width,oc.height);
  const cols=10,rows=7,cw=WW/cols,chh=WH/rows;
  for(let ix=0;ix<cols;ix++)for(let iy=0;iy<rows;iy++){c.fillStyle=(ix+iy)%2===0?'#1c5f1c':'#217021';c.fillRect(wx(ix*cw),wy(iy*chh),ws(cw)+1,ws(chh)+1);}
  const lg=c.createLinearGradient(0,wy(0),0,wy(WH));lg.addColorStop(0,'rgba(255,255,255,.05)');lg.addColorStop(.5,'rgba(255,255,255,0)');lg.addColorStop(1,'rgba(0,0,0,.06)');
  c.fillStyle=lg;c.fillRect(wx(0),wy(0),ws(WW),ws(WH));
  c.save();c.strokeStyle=LINE;c.lineWidth=ws(.18);
  c.strokeRect(wx(0),wy(0),ws(WW),ws(WH));
  c.beginPath();c.moveTo(wx(PCX),wy(0));c.lineTo(wx(PCX),wy(WH));c.stroke();
  c.beginPath();c.arc(wx(PCX),wy(PCY),ws(7),0,Math.PI*2);c.stroke();
  c.beginPath();c.arc(wx(PCX),wy(PCY),ws(.32),0,Math.PI*2);c.fillStyle=LINE;c.fill();
  [[0,true],[WW,false]].forEach(([gx,left])=>{
    c.strokeStyle=LINE;c.lineWidth=ws(.18);
    c.strokeRect(wx(left?0:WW-PA_W),wy(PCY-PA_H/2),ws(PA_W),ws(PA_H));
    c.strokeRect(wx(left?0:WW-4),wy(PCY-7),ws(4),ws(14));
    c.save();c.strokeStyle='rgba(255,255,255,.82)';c.lineWidth=ws(.28);const gw=2.4,gh=GY2-GY1;
    c.strokeRect(left?wx(-gw):wx(WW),wy(GY1),ws(gw),ws(gh));
    c.strokeStyle='rgba(255,255,255,.12)';c.lineWidth=ws(.06);
    for(let k=0;k<=3;k++){const ny=GY1+(gh/3)*k;c.beginPath();c.moveTo(left?wx(-gw):wx(WW),wy(ny));c.lineTo(left?wx(0):wx(WW),wy(ny));c.stroke();}
    for(let k=0;k<=4;k++){const nx=(left?-gw:WW)+(gw/4)*k;c.beginPath();c.moveTo(wx(nx),wy(GY1));c.lineTo(wx(nx),wy(GY2));c.stroke();}
    c.restore();
    c.beginPath();c.arc(wx(left?PSX:WW-PSX),wy(PCY),ws(.35),0,Math.PI*2);c.fillStyle=LINE;c.fill();
    c.beginPath();c.arc(wx(left?PSX:WW-PSX),wy(PCY),ws(7),left?-Math.PI*.55:Math.PI*.45,left?Math.PI*.55:Math.PI*1.55);c.strokeStyle='rgba(255,255,255,.3)';c.stroke();
  });
  [[0,0,0,Math.PI/2],[WW,0,Math.PI/2,Math.PI],[0,WH,-Math.PI/2,0],[WW,WH,Math.PI,-Math.PI/2]].forEach(([cx,cy,a1,a2])=>{c.beginPath();c.arc(wx(cx),wy(cy),ws(1),a1,a2);c.strokeStyle='rgba(255,255,255,.3)';c.lineWidth=ws(.15);c.stroke();});
  c.restore();
  const cx0=oc.width/2,cy0=oc.height/2,rad=Math.max(oc.width,oc.height)*.75;
  const vg=c.createRadialGradient(cx0,cy0,rad*.35,cx0,cy0,rad);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.28)');
  c.fillStyle=vg;c.fillRect(0,0,oc.width,oc.height);
  _pitchCache=oc;_pitchW=oc.width;_pitchH=oc.height;
}
function drawPitch(){if(!_pitchCache||_pitchW!==cvs.width||_pitchH!==cvs.height)_buildPitchCache();ctx.drawImage(_pitchCache,0,0);}
function drawShadow(x,y,r){ctx.save();ctx.globalAlpha=.2;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(wx(x),wy(y+r*.7),ws(r*.95),ws(r*.28),0,0,Math.PI*2);ctx.fill();ctx.restore();}

// ─── Démo joueurs + ballon ───
let sprint=true;
const players=[
  {x:20,y:18,col:'#e0402f',name:'Alpha',pos:'DC',hasBall:false,_trail:[]},
  {x:32,y:25,col:'#e0402f',name:'Bravo',pos:'MC',hasBall:true,_trail:[]},
  {x:48,y:32,col:'#2f7fe0',name:'Zeta',pos:'ATT',hasBall:false,_trail:[]},
];
const ball={x:32,y:25,vx:0,vy:0,trail:[],spin:0};
let t0=performance.now();

function drawPlayer(p){
  const px=wx(p.x),py=wy(p.y),r=ws(1.55);
  drawShadow(p.x,p.y,1.55);
  const runSpd=Math.hypot(p.vx||0,p.vy||0);
  if(!p._trail)p._trail=[];
  if(runSpd>2.2){p._trail.push({x:px,y:py});if(p._trail.length>6)p._trail.shift();}else if(p._trail.length)p._trail.shift();
  if(runSpd>4.2&&p._trail.length>1){ctx.save();for(let i=0;i<p._trail.length-1;i++){const tr=p._trail[i];ctx.globalAlpha=(i/p._trail.length)*.30;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(tr.x,tr.y,r*(.5+.5*i/p._trail.length),0,Math.PI*2);ctx.fill();}ctx.restore();}
  if(p.hasBall){ctx.save();const pulse=.5+.5*Math.sin(performance.now()/1000*4);const r2=r*(2.4+pulse*.5);const grd=ctx.createRadialGradient(px,py,r*.5,px,py,r2);grd.addColorStop(0,p.col+'55');grd.addColorStop(1,p.col+'00');ctx.fillStyle=grd;ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.55+pulse*.35;ctx.strokeStyle=p.col;ctx.lineWidth=ws(.18);ctx.beginPath();ctx.arc(px,py,r*1.7,0,Math.PI*2);ctx.stroke();ctx.restore();}
  ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);const bg=ctx.createRadialGradient(px-r*.3,py-r*.3,0,px,py,r);bg.addColorStop(0,lighten(p.col,.35));bg.addColorStop(1,p.col);ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=ws(.1);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`800 ${r*.85}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.name.slice(0,2).toUpperCase(),px,py);
  ctx.font=`700 ${ws(.5)}px system-ui`;ctx.fillStyle='rgba(0,0,0,.7)';ctx.textBaseline='top';ctx.fillText(p.name,px,py+r+ws(.2));ctx.fillStyle='#fff';ctx.fillText(p.name,px,py+r+ws(.16));
}
function drawBall(){
  const b=ball,bx=wx(b.x),by=wy(b.y),r=ws(1.0),spd=Math.hypot(b.vx,b.vy),fast=Math.min(1,spd/6);
  for(let i=1;i<b.trail.length;i++){const a=(i/b.trail.length)*(.35+fast*.4),lw=(i/b.trail.length)*ws(.4)*(1+fast*.8);ctx.beginPath();ctx.moveTo(wx(b.trail[i-1].x),wy(b.trail[i-1].y));ctx.lineTo(wx(b.trail[i].x),wy(b.trail[i].y));ctx.strokeStyle=fast>.4?`rgba(255,235,150,${a})`:`rgba(255,255,255,${a})`;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();}
  drawShadow(b.x,b.y,.75);const now=Date.now()*.001;ctx.save();ctx.translate(bx,by);
  if(fast>.25&&spd>.01){const ang=Math.atan2(b.vy,b.vx);ctx.rotate(ang);ctx.scale(1+fast*.35,1-fast*.12);ctx.rotate(-ang);}
  ctx.rotate(b.spin*.05+now);ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle='#f2f2f2';ctx.fill();ctx.strokeStyle='#2a2a2a';ctx.lineWidth=ws(.07);ctx.stroke();
  [[0,-r*.58],[r*.5,-r*.28],[-r*.5,-r*.28],[r*.5,r*.3],[-r*.5,r*.3],[0,r*.55]].forEach(([ox,oy])=>{ctx.fillStyle='#303030';ctx.beginPath();ctx.arc(ox,oy,ws(.11),0,Math.PI*2);ctx.fill();});
  ctx.restore();
}

// ─── Temps forts ───
let _shake={t:0,dur:0,mag:0};
function triggerShake(mag,dur){_shake={t:performance.now(),dur,mag};}
function _shakeOffset(){if(!_shake.dur)return{x:0,y:0};const el=performance.now()-_shake.t;if(el>=_shake.dur){_shake.dur=0;return{x:0,y:0};}const k=1-el/_shake.dur,amp=_shake.mag*8*k;return{x:(Math.random()*2-1)*amp,y:(Math.random()*2-1)*amp};}
let _flash={t:0,dur:0,peak:0,col:'#fff'};
function triggerFlash(col,peak,dur){_flash={t:performance.now(),dur,peak,col};}
function drawFlash(){if(!_flash.dur)return;const el=performance.now()-_flash.t;if(el>=_flash.dur){_flash.dur=0;return;}const k=1-el/_flash.dur;ctx.save();ctx.globalAlpha=_flash.peak*k;ctx.fillStyle=_flash.col;ctx.fillRect(0,0,cvs.width,cvs.height);ctx.restore();}
let goalLabel=null;
function doGoal(col){triggerShake(1,520);triggerFlash(col,.32,420);goalLabel={t:performance.now()};}

function toggleSprint(){sprint=!sprint;}

// ─── Particules lumineuses (aperçu du nouveau rendu de sorts) ───
let ptcl=[];
function castSpell(){
  const cx=PCX,cy=PCY,cols=['#8840e0','#d090ff','#f0c028','#00bcd4','#82b1ff'];
  for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,s=0.4+Math.random()*1.5;
    ptcl.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:60,m:60,col:cols[i%cols.length],sz:0.3+Math.random()*0.6});}
  for(let i=0;i<4;i++)ptcl.push({t:'ring',x:cx,y:cy,maxR:10,l:45,m:45,col:cols[i%cols.length]});
}
function drawParticles(){
  ptcl=ptcl.filter(p=>p.l>0);
  ptcl.forEach(p=>{
    const a=Math.max(0,p.l/p.m);p.l--;
    if(p.t==='ring'){const prog=1-a,curR=ws(p.maxR)*prog;ctx.save();ctx.globalCompositeOperation='lighter';ctx.globalAlpha=a*.9;ctx.strokeStyle=p.col;ctx.lineWidth=ws(.3)*(1-prog);ctx.beginPath();ctx.arc(wx(p.x),wy(p.y),curR,0,Math.PI*2);ctx.stroke();ctx.restore();return;}
    p.x+=p.vx*.3;p.y+=p.vy*.3;p.vx*=.96;p.vy*=.96;
    const gx=wx(p.x),gy=wy(p.y),sz=ws((p.sz||.3)*Math.sqrt(a));
    ctx.save();ctx.globalCompositeOperation='lighter';
    const glow=ctx.createRadialGradient(gx,gy,0,gx,gy,sz*2.6);glow.addColorStop(0,p.col);glow.addColorStop(.4,p.col+'88');glow.addColorStop(1,p.col+'00');
    ctx.globalAlpha=a*.55;ctx.fillStyle=glow;ctx.beginPath();ctx.arc(gx,gy,sz*2.6,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=a;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(gx,gy,sz,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

// ─── Anim ───
function loop(){
  requestAnimationFrame(loop);
  // Fait bouger Zeta pour montrer la traînée
  const z=players[2];
  if(sprint){z.vx=5.5;z.x+=0.12;if(z.x>68)z.x=8;}else{z.vx=0;}
  // Ballon qui oscille pour montrer trail+squash
  const now=performance.now()/1000;
  ball.vx=Math.cos(now*1.5)*5;ball.vy=Math.sin(now*1.5)*2;
  ball.x=32+Math.cos(now*1.5)*8;ball.y=25+Math.sin(now*1.5)*4;
  ball.trail.push({x:ball.x,y:ball.y});if(ball.trail.length>12)ball.trail.shift();ball.spin+=.4;
  ctx.clearRect(0,0,cvs.width,cvs.height);
  drawPitch();
  const sh=_shakeOffset(),shaking=(sh.x||sh.y);
  if(shaking){ctx.save();ctx.translate(sh.x,sh.y);}
  players.forEach(drawPlayer);
  drawBall();
  drawParticles();
  if(goalLabel){const el=performance.now()-goalLabel.t;if(el<1400){ctx.save();ctx.globalAlpha=Math.max(0,1-el/1400);ctx.fillStyle='#f0c028';ctx.font=`900 ${ws(5)}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('BUT !',wx(PCX),wy(PCY-4));ctx.restore();}else goalLabel=null;}
  if(shaking)ctx.restore();
  drawFlash();
}
window.addEventListener('resize',resize);
resize();loop();
</script>
</body></html>
